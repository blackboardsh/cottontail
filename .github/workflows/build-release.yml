name: Build and publish Cottontail

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cottontail-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-26
            os: macos
          - platform: linux-x64
            runner: ubuntu-24.04
            os: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            os: linux
          - platform: windows-x64
            runner: windows-2025
            os: windows

    steps:
      - name: Check out Cottontail
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Restore vendored toolchains
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            vendors/zig
            vendors/jsc
            vendors/zig-html-rewriter
            vendors/windows-deps
          key: cottontail-${{ matrix.platform }}-v1-${{ hashFiles('scripts/zig-manifest.json', 'scripts/jsc-manifest.json', 'scripts/zig-html-rewriter-manifest.json', 'vcpkg.json') }}

      - name: Select Xcode 26.4
        if: matrix.os == 'macos'
        run: |
          developer_dir=/Applications/Xcode_26.4.app/Contents/Developer
          test -d "$developer_dir"
          sudo xcode-select --switch "$developer_dir"
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path

      - name: Install macOS build dependencies
        if: matrix.os == 'macos'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install libffi brotli
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3

      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            g++ \
            libbrotli-dev \
            libffi-dev \
            libssl-dev \
            libzstd-dev \
            zlib1g-dev

      - name: Verify Windows build environment
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $os = Get-CimInstance Win32_OperatingSystem
          $icu = (Get-Item "$env:SystemRoot\System32\icu.dll").VersionInfo
          Write-Host "Windows: $($os.Caption) $($os.Version)"
          Write-Host "System ICU: $($icu.FileVersion)"
          $nodeIdentity = node -p "process.versions.node + ' ' + process.platform + ' ' + process.arch"
          if ($LASTEXITCODE -ne 0 -or $nodeIdentity.Trim() -ne "24.18.0 win32 x64") {
            throw "Expected Node 24.18.0 win32 x64, got '$nodeIdentity'"
          }

      - name: Vendor Zig, HTML rewriter, and JavaScriptCore
        if: matrix.os != 'windows'
        run: |
          node scripts/setup.js
          node scripts/setup-zig-html-rewriter.js
          node scripts/setup-jsc.js

      - name: Vendor Zig, HTML rewriter, and JavaScriptCore
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          node scripts/setup.js
          if ($LASTEXITCODE -ne 0) { throw "Zig setup failed" }
          node scripts/setup-zig-html-rewriter.js
          if ($LASTEXITCODE -ne 0) { throw "HTML rewriter setup failed" }
          node scripts/setup-jsc.js
          if ($LASTEXITCODE -ne 0) { throw "JavaScriptCore setup failed" }

      - name: Run Zig tests
        if: matrix.os != 'windows'
        run: node scripts/zig.js build test

      - name: Run Zig tests
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          node scripts/zig.js build test
          if ($LASTEXITCODE -ne 0) { throw "Windows tests failed" }

      - name: Build release binary
        if: matrix.os != 'windows'
        run: node scripts/zig.js build -Doptimize=ReleaseSmall -Dcpu=baseline

      - name: Build release binary
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          node scripts/zig.js build -Doptimize=ReleaseSmall -Dtarget=x86_64-windows-msvc -Dcpu=baseline
          if ($LASTEXITCODE -ne 0) { throw "Windows release build failed" }

      - name: Smoke test release binary
        if: matrix.os != 'windows'
        run: test "$(./zig-out/bin/cottontail -p '6 * 7')" = "42"

      - name: Smoke test release binary
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $output = & .\zig-out\bin\cottontail.exe -p '6 * 7'
          if ($LASTEXITCODE -ne 0 -or $output.Trim() -ne '42') {
            throw "Cottontail smoke test failed: $output"
          }

      - name: Package release
        if: matrix.os != 'windows'
        run: node scripts/package-release.js

      - name: Package release
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          node scripts/package-release.js
          if ($LASTEXITCODE -ne 0) { throw "Windows packaging failed" }

      - name: Smoke test packaged pinned ICU fallback
        if: matrix.os == 'linux'
        run: |
          archive=$(find "$PWD/release" -maxdepth 1 -name 'cottontail-*-linux-*.tar.gz' -print -quit)
          test -n "$archive"
          smoke_image="cottontail-icu-smoke:${GITHUB_RUN_ID}-${{ matrix.platform }}"
          trap 'docker image rm --force "$smoke_image" >/dev/null 2>&1 || true' EXIT
          docker build --tag "$smoke_image" - <<'DOCKERFILE'
          FROM ubuntu:24.04
          RUN apt-get update >/dev/null \
            && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              libatomic1 libbrotli1 libffi8 libgcc-s1 libstdc++6 zlib1g >/dev/null \
            && mkdir -p /app /work \
            && rm -rf /var/lib/apt/lists/*
          DOCKERFILE
          docker run --rm \
            --network none \
            --read-only \
            --tmpfs /app:rw,exec \
            --tmpfs /tmp:rw,exec \
            --tmpfs /work:rw,exec \
            --workdir /work \
            --env HOME=/unwritable \
            --env XDG_DATA_HOME=/unwritable \
            -v "$archive:/release.tar.gz:ro" \
            -v "$PWD/tests/js/icu-fallback-smoke.js:/icu-fallback-smoke.js:ro" \
            "$smoke_image" \
            bash -euc '
              if ldconfig -p | grep -q "libicu"; then
                echo "minimal test image unexpectedly contains system ICU" >&2
                exit 1
              fi
              tar -xzf /release.tar.gz --strip-components=1 -C /app
              test -f /app/share/cottontail/icu/70.1/icudt70l.dat
              test -f /app/share/cottontail/icu/70.1/LICENSE
              test "$(/app/bin/cottontail /icu-fallback-smoke.js)" = "icu fallback passed"
            '

      - name: Retain release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cottontail-release-${{ matrix.platform }}
          path: |
            release/cottontail-*.tar.gz
            release/cottontail-*.tar.gz.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  publish:
    name: Publish complete release matrix to R2
    needs:
      - build
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    concurrency:
      group: cottontail-r2-publish
      cancel-in-progress: false

    steps:
      - name: Check out Cottontail
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Download complete release matrix
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cottontail-release-*
          path: release
          merge-multiple: true

      - name: Publish complete release matrix
        env:
          COTTONTAIL_R2_ACCOUNT_ID: ${{ secrets.COTTONTAIL_R2_ACCOUNT_ID }}
          COTTONTAIL_R2_ACCESS_KEY_ID: ${{ secrets.COTTONTAIL_R2_ACCESS_KEY_ID }}
          COTTONTAIL_R2_SECRET_ACCESS_KEY: ${{ secrets.COTTONTAIL_R2_SECRET_ACCESS_KEY }}
          COTTONTAIL_R2_PUBLIC_BASE_URL: ${{ secrets.COTTONTAIL_R2_PUBLIC_BASE_URL || vars.COTTONTAIL_R2_PUBLIC_BASE_URL }}
        run: node scripts/upload-release-r2.js --all
