version: 2.1

orbs:
  win: circleci/windows@5.1.1

commands:
  setup-unix:
    steps:
      - run:
          name: Vendor Zig and JavaScriptCore
          command: node scripts/setup.js && node scripts/setup-jsc.js
  build-test-package-unix:
    steps:
      - run:
          name: Run Zig tests
          command: node scripts/zig.js build test
      - run:
          name: Build release binary
          command: node scripts/zig.js build -Doptimize=ReleaseSmall -Dcpu=baseline
      - run:
          name: Smoke test release binary
          command: test "$(./zig-out/bin/cottontail -p '6 * 7')" = "42"
      - run:
          name: Package release
          command: node scripts/package-release.js
      - store_artifacts:
          path: release
      - persist_to_workspace:
          root: .
          paths:
            - release
  smoke-test-linux-icu-fallback:
    steps:
      - run:
          name: Smoke test packaged pinned ICU fallback
          command: |
            archive=$(find "$PWD/release" -maxdepth 1 -name 'cottontail-*-linux-*.tar.gz' -print -quit)
            test -n "$archive"
            docker run --rm \
              -v "$archive:/release.tar.gz:ro" \
              -v "$PWD/tests/js/icu-fallback-smoke.js:/icu-fallback-smoke.js:ro" \
              ubuntu:24.04 \
              bash -euc '
                apt-get update >/dev/null
                apt-get install -y --no-install-recommends \
                  ca-certificates libatomic1 libbrotli1 libffi8 libgcc-s1 libstdc++6 zlib1g >/dev/null
                if ldconfig -p | grep -q "libicu"; then
                  echo "minimal test image unexpectedly contains system ICU" >&2
                  exit 1
                fi
                mkdir /app
                tar -xzf /release.tar.gz --strip-components=1 -C /app
                test "$(/app/bin/cottontail /icu-fallback-smoke.js)" = "icu fallback passed"
              '

jobs:
  build-macos-arm64:
    macos:
      xcode: 26.4.0
    resource_class: m4pro.medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - cottontail-macos-arm64-v4-{{ checksum "scripts/zig-manifest.json" }}-{{ checksum "scripts/jsc-manifest.json" }}-{{ checksum "vendors/lol-html/c-api/Cargo.lock" }}
      - run:
          name: Install build dependencies
          command: |
            brew install node@24 libffi brotli
            brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            echo 'export PATH="$HOME/.cargo/bin:/opt/homebrew/opt/node@24/bin:$PATH"' >> "$BASH_ENV"
      - setup-unix
      - save_cache:
          key: cottontail-macos-arm64-v4-{{ checksum "scripts/zig-manifest.json" }}-{{ checksum "scripts/jsc-manifest.json" }}-{{ checksum "vendors/lol-html/c-api/Cargo.lock" }}
          paths:
            - vendors/zig
            - vendors/jsc
            - ~/.cargo
            - ~/.rustup
            - .zig-cache/lolhtml
      - build-test-package-unix

  build-linux-x64:
    machine:
      image: ubuntu-2404:2026.05.1
    resource_class: medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - cottontail-linux-x64-v4-{{ checksum "scripts/zig-manifest.json" }}-{{ checksum "scripts/jsc-manifest.json" }}-{{ checksum "vendors/lol-html/c-api/Cargo.lock" }}
      - run:
          name: Install build dependencies
          command: |
            curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
            sudo apt-get install -y \
              nodejs clang g++ libbrotli-dev libffi-dev libssl-dev libzstd-dev zlib1g-dev
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> "$BASH_ENV"
      - setup-unix
      - save_cache:
          key: cottontail-linux-x64-v4-{{ checksum "scripts/zig-manifest.json" }}-{{ checksum "scripts/jsc-manifest.json" }}-{{ checksum "vendors/lol-html/c-api/Cargo.lock" }}
          paths:
            - vendors/zig
            - vendors/jsc
            - ~/.cargo
            - ~/.rustup
            - .zig-cache/lolhtml
      - build-test-package-unix
      - smoke-test-linux-icu-fallback

  build-linux-arm64:
    machine:
      image: ubuntu-2404:2026.05.1
    resource_class: arm.medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - cottontail-linux-arm64-v4-{{ checksum "scripts/zig-manifest.json" }}-{{ checksum "scripts/jsc-manifest.json" }}-{{ checksum "vendors/lol-html/c-api/Cargo.lock" }}
      - run:
          name: Install build dependencies
          command: |
            curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
            sudo apt-get install -y \
              nodejs clang g++ libbrotli-dev libffi-dev libssl-dev libzstd-dev zlib1g-dev
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> "$BASH_ENV"
      - setup-unix
      - save_cache:
          key: cottontail-linux-arm64-v4-{{ checksum "scripts/zig-manifest.json" }}-{{ checksum "scripts/jsc-manifest.json" }}-{{ checksum "vendors/lol-html/c-api/Cargo.lock" }}
          paths:
            - vendors/zig
            - vendors/jsc
            - ~/.cargo
            - ~/.rustup
            - .zig-cache/lolhtml
      - build-test-package-unix
      - smoke-test-linux-icu-fallback

  build-windows-x64:
    executor:
      name: win/server-2025
      version: "2026.05.1"
    steps:
      - checkout
      - restore_cache:
          keys:
            - cottontail-windows-x64-v7-{{ checksum "scripts/zig-manifest.json" }}-{{ checksum "scripts/jsc-manifest.json" }}-{{ checksum "vcpkg.json" }}-{{ checksum "vendors/lol-html/c-api/Cargo.lock" }}
      - run:
          name: Install build dependencies
          shell: powershell.exe
          command: |
            $os = Get-CimInstance Win32_OperatingSystem
            $icu = (Get-Item "$env:SystemRoot\System32\icu.dll").VersionInfo
            Write-Host "Windows: $($os.Caption) $($os.Version)"
            Write-Host "System ICU: $($icu.FileVersion)"
            nvm install 24.18.0 64
            if ($LASTEXITCODE -ne 0) { throw "Node.js 24.18.0 installation failed through nvm" }
            nvm use 24.18.0 64
            if ($LASTEXITCODE -ne 0) { throw "Could not select Node.js 24.18.0 x64 through nvm" }
            $rustupInit = Join-Path $env:TEMP "rustup-init.exe"
            $rustupUrl = "https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe"
            curl.exe --proto '=https' --tlsv1.2 --fail --location --retry 3 --output $rustupInit $rustupUrl
            if ($LASTEXITCODE -ne 0) { throw "Could not download the official x64 rustup installer" }
            & $rustupInit -y --profile minimal --default-host x86_64-pc-windows-msvc --default-toolchain stable --no-modify-path
            if ($LASTEXITCODE -ne 0) { throw "rustup installation failed" }
            $nodeIdentity = node -p "process.versions.node + ' ' + process.platform + ' ' + process.arch"
            if ($LASTEXITCODE -ne 0 -or $nodeIdentity.Trim() -ne "24.18.0 win32 x64") {
              throw "Expected Node 24.18.0 win32 x64, got '$nodeIdentity'"
            }
            $cargoBin = Join-Path $env:USERPROFILE ".cargo\bin"
            $env:Path = "$cargoBin;$env:Path"
            [Environment]::SetEnvironmentVariable("Path", "$cargoBin;" + [Environment]::GetEnvironmentVariable("Path", "User"), "User")
            $rustup = Join-Path $cargoBin "rustup.exe"
            & $rustup default stable
            if ($LASTEXITCODE -ne 0) { throw "Could not select the stable Rust toolchain" }
            & $rustup target add --toolchain stable x86_64-pc-windows-msvc
            if ($LASTEXITCODE -ne 0) { throw "Could not install the x86_64-pc-windows-msvc Rust target" }
            $installedTargets = & $rustup target list --toolchain stable --installed
            if ($LASTEXITCODE -ne 0 -or $installedTargets -notcontains "x86_64-pc-windows-msvc") {
              throw "Rust target x86_64-pc-windows-msvc was not installed by $rustup"
            }
            # Select Cargo and Rustc through the same rustup toolchain. A later
            # CircleCI step does not inherit this step's process-level PATH.
            & $rustup run stable cargo -vV
            if ($LASTEXITCODE -ne 0) { throw "Cargo is unavailable in the stable Rust toolchain" }
            Set-Content -Path "$env:TEMP\rust-probe.rs" -Value "fn main() {}"
            & $rustup run stable rustc --target x86_64-pc-windows-msvc -o "$env:TEMP\rust-probe.exe" "$env:TEMP\rust-probe.rs"
            if ($LASTEXITCODE -ne 0) { throw "Rust msvc target is present in metadata but cannot compile; toolchain is broken" }
      - run:
          name: Vendor Zig and JavaScriptCore
          shell: powershell.exe
          command: |
            node scripts/setup.js
            if ($LASTEXITCODE -ne 0) { throw "Zig setup failed" }
            node scripts/setup-jsc.js
            if ($LASTEXITCODE -ne 0) { throw "JavaScriptCore setup failed" }
      - save_cache:
          key: cottontail-windows-x64-v7-{{ checksum "scripts/zig-manifest.json" }}-{{ checksum "scripts/jsc-manifest.json" }}-{{ checksum "vcpkg.json" }}-{{ checksum "vendors/lol-html/c-api/Cargo.lock" }}
          paths:
            - vendors/zig
            - vendors/jsc
            - vendors/windows-deps
            - ~/.cargo/registry
            - ~/.cargo/git
            - .zig-cache/lolhtml
      - run:
          name: Run Zig tests
          shell: powershell.exe
          no_output_timeout: 30m
          command: |
            node scripts/zig.js build test
            if ($LASTEXITCODE -ne 0) { throw "Windows tests failed" }
      - run:
          name: Build release binary
          shell: powershell.exe
          no_output_timeout: 30m
          command: |
            node scripts/zig.js build -Doptimize=ReleaseSmall -Dcpu=baseline
            if ($LASTEXITCODE -ne 0) { throw "Windows release build failed" }
      - run:
          name: Smoke test release binary
          shell: powershell.exe
          command: |
            $output = & .\zig-out\bin\cottontail.exe -p '6 * 7'
            if ($LASTEXITCODE -ne 0 -or $output.Trim() -ne '42') {
              throw "Cottontail smoke test failed: $output"
            }
      - run:
          name: Package release
          shell: powershell.exe
          command: |
            node scripts/package-release.js
            if ($LASTEXITCODE -ne 0) { throw "Windows packaging failed" }
      - store_artifacts:
          path: release
      - persist_to_workspace:
          root: .
          paths:
            - release

  publish-preview:
    docker:
      - image: cimg/node:24.18
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Publish complete preview release
          command: node scripts/upload-release-r2.js --all

workflows:
  build-release-matrix:
    jobs:
      - build-macos-arm64
      - build-linux-x64
      - build-linux-arm64
      - build-windows-x64
      - publish-preview:
          requires:
            - build-macos-arm64
            - build-linux-x64
            - build-linux-arm64
            - build-windows-x64
          filters:
            branches:
              only: main
